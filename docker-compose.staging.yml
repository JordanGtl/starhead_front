name: starhead-front-staging

services:
  front:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "11100:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://staging-api.star-head.sc}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://staging.star-head.sc}
    restart: unless-stopped
