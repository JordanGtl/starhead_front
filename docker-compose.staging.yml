name: starhead-front-staging

services:
  front:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:11100:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.star-head.dev}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://star-head.dev}
    restart: unless-stopped
