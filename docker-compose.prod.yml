name: starhead-front-prod

services:
  front:
    image: starhead-front:${IMAGE_TAG:-latest}
    ports:
      - "11200:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.star-head.sc}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://star-head.sc}
    restart: always
